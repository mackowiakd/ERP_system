<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projekt Interfejsu - System ERP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --success: #1cc88a;
            --danger: #e74a3b;
            --warning: #f6c23e;
            --dark: #5a5c69;
            --bg: #f8f9fc;
            --border: #e3e6f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--dark);
        }
        /* Pasek boczny (Sidebar) */
        .sidebar {
            width: 250px;
            background-color: #fff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .brand {
            color: var(--primary);
            font-weight: 900;
            font-size: 1.2rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
        .nav-link {
            display: block;
            padding: 10px 15px;
            color: var(--dark);
            text-decoration: none;
            font-weight: 600;
            border-radius: 5px;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .nav-link i { width: 25px; }
        .nav-link:hover, .nav-link.active {
            background-color: var(--bg);
            color: var(--primary);
        }
        /* Główny kontener */
        .main-content {
            flex: 1;
            padding: 2rem 3rem;
            overflow-y: auto;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-header h1 { margin: 0; font-size: 1.8rem; color: var(--dark); }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        /* Karty podsumowujące (Widgety) */
        .cards-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }
        .card {
            flex: 1;
            background: #fff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border-left: 5px solid var(--primary);
        }
        .card.danger { border-left-color: var(--danger); }
        .card.success { border-left-color: var(--success); }
        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #858796;
            font-weight: 800;
            margin-bottom: 5px;
        }
        .card-value { font-size: 1.8rem; font-weight: bold; }
        /* Tabela danych */
        .table-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            padding: 1.5rem;
        }
        .table-container h2 { margin-top: 0; font-size: 1.2rem; color: var(--primary); margin-bottom: 15px;}
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th { color: #858796; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; }
        .badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        .bg-danger { background: var(--danger); }
        .bg-success { background: var(--success); }
        .bg-warning { background: var(--warning); color: #fff; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand"><i class="fas fa-building"></i> Mini-ERP System</div>
        
        <span style="font-size: 0.8rem; color: #858796; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Menu Główne</span>
        <a href="#" class="nav-link active"><i class="fas fa-tachometer-alt"></i> Pulpit</a>
        <a href="#" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Faktury</a>
        <a href="#" class="nav-link"><i class="fas fa-handshake"></i> Kontrahenci</a>
        <a href="#" class="nav-link"><i class="fas fa-exchange-alt"></i> Finanse i Wpłaty</a>
        
        <span style="font-size: 0.8rem; color: #858796; margin-top: 20px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Narzędzia</span>
        <a href="#" class="nav-link"><i class="fas fa-calendar-alt"></i> Kalendarz</a>
        <a href="#" class="nav-link"><i class="fas fa-chart-pie"></i> Raporty PDF</a>
        <a href="#" class="nav-link"><i class="fas fa-users"></i> Pracownicy</a>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1>Pulpit Finansowy</h1>
            <button class="btn-primary"><i class="fas fa-plus"></i> Nowa Faktura</button>
        </div>

        <div class="cards-row">
            <div class="card success">
                <div class="card-title">Główne Saldo Firmy</div>
                <div class="card-value">124 500,00 zł</div>
            </div>
            <div class="card warning">
                <div class="card-title" style="color: #f6c23e;">Oczekujące Należności (Klienci)</div>
                <div class="card-value">18 200,00 zł</div>
            </div>
            <div class="card danger">
                <div class
