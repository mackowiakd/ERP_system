<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalendarz finansowy</title>

    <!-- Twoje style aplikacji (sidebar/layout) -->
    <link rel="stylesheet" href="/css/dashboard.css" />

    <!-- Ikony -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <!-- Style kalendarza (z folderu /calendar) -->
    <link rel="stylesheet" href="/css/calendar.css" />
  </head>

  <body class="calendar-page">
    <div class="layout">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Home Budget Manager</span>
      </div>

      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/household'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container" id="calendar-main">
        <div class="calendar-root">
          <div class="app-container">
            <header class="app-header">
              <h1><i class="fas fa-calendar-alt"></i> Kalendarz finansowy</h1>
              <div class="header-controls">
                <button id="today-btn">Dziś</button>
                <div class="view-options">
                  <button class="view-option" data-view="day">Dzień</button>
                  <button class="view-option" data-view="week">Tydzień</button>
                  <button class="view-option active" data-view="month">
                    Miesiąc
                  </button>
                </div>
                <div class="date-navigation">
                  <button id="prev-btn">
                    <i class="fas fa-chevron-left"></i>
                  </button>
                  <h2 id="current-date">May 2023</h2>
                  <button id="next-btn">
                    <i class="fas fa-chevron-right"></i>
                  </button>
                </div>
              </div>
            </header>

            <main class="app-main">
              <div class="calendar-view" id="calendar-view"></div>

              <aside class="calendar-events-panel">
                <div class="sidebar-header">
                  <h3>Najbliższe nadchodzące wydarzenia</h3>
                  <button id="add-event-btn">
                    <i class="fas fa-plus"></i> Dodaj Transakcję
                  </button>
                </div>
                <div class="events-list" id="events-list"></div>
              </aside>
            </main>
          </div>

          <!-- Edit/Add Event Modal -->
          <div class="modal" id="event-modal">
            <div class="modal-content">
              <span class="close-btn">&times;</span>
              <h2>Edytuj Transakcję</h2>

              <form id="event-form">
                <div class="form-group">
                  <label for="event-title">Tytuł</label>
                  <input type="text" id="event-title" required maxlength="20" />
                </div>

                <div class="form-group">
                  <label for="event-type">Typ</label>
                  <select id="event-type">
                    <option value="0">Wydatek</option>
                    <option value="1">Przychód</option>
                  </select>
                </div>

                <div class="form-group">
                  <label for="event-amount">Kwota</label>
                  <input type="number" step="0.01" id="event-amount" required />
                </div>

                <div class="form-group">
                  <label for="event-date">Data</label>
                  <input type="date" id="event-date" required />
                </div>

                <div class="form-group">
                  <label for="event-description">Opis</label>
                  <textarea id="event-description" rows="3"></textarea>
                </div>

                <button type="submit" class="save-btn">Zapisz</button>
              </form>
            </div>
          </div>

          <!-- Event Details Modal -->
          <div class="modal" id="event-details-modal">
            <div class="modal-content">
              <span class="close-btn">&times;</span>
              <h2 id="details-title">Tytuł</h2>
              <div class="event-details">
                <p>
                  <i class="fas fa-calendar-day"></i>
                  <span id="details-date">Data</span>
                </p>
                <p>
                  <i class="fas fa-clock"></i>
                  <span id="details-time">Czas</span>
                </p>
                <p>
                  <i class="fas fa-align-left"></i>
                  <span id="details-description">Opis</span>
                </p>
              </div>
              <div class="event-actions">
                <button id="edit-event-btn">Edytuj</button>
                <button id="delete-event-btn">Usuń</button>
                <button id="close-details-btn">Zamknij</button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Skrypt kalendarza -->
    <script src="/js/calendar.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("sidebar-toggle");
        const sidebar = document.querySelector(".sidebar");

        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("open");
          });
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener("click", (e) => {
          if (
            window.innerWidth <= 768 &&
            sidebar.classList.contains("open") &&
            !sidebar.contains(e.target) &&
            !toggleBtn.contains(e.target)
          ) {
            sidebar.classList.remove("open");
          }
        });
      });
    </script>
  </body>
</html>
