<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Raporty - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/raports.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <!-- Mobile Header - visible only on small screens -->
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">System Mini-ERP</span>
      </div>

      <!-- Navigation Sidebar -->
      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        
        <!-- Standard logout form -->
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <!-- Main report generation card -->
      <main class="container">
          <section class="card">
              <h2>Generator Raportów PDF</h2>
              <p class="card-desc">
                  Wybierz zakres dat, ustaw filtry i wygeneruj szczegółowy raport PDF dla swojej firmy.
              </p>
              <form class="report-controls" method="post" id="dynamicReportForm">

                  <div class="form-group" style="background-color: #e3e6f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                      <label style="font-weight: bold; font-size: 1.1em;"><i class="fas fa-file-alt"></i> Wybierz rodzaj raportu:</label>
                      <select id="reportTypeSelector" style="width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; font-weight: bold;">
                          <option value="turnover">1. Zestawienie Obrotów (Zyski i Straty)</option>
                          <option value="aging">2. Wiekowanie Rozrachunków</option>
                      </select>
                  </div>

                  <div class="form-group" style="margin-bottom: 1rem;">
                      <label>Zakres raportu:</label>
                      <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                          <label style="cursor: pointer;"><input type="radio" name="reportScope" value="individual" /> Tylko ja</label>
                          <label style="cursor: pointer;"><input type="radio" name="reportScope" value="company" checked /> Firma</label>
                      </div>
                  </div>

                  <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                      <div class="form-group" style="flex: 1;" id="startDateContainer">
                          <label for="startDate">Od:</label>
                          <input type="date" id="startDate" name="startDate" value="{startDate}" required style="width: 100%; padding: 8px;" />
                      </div>
                      <div class="form-group" style="flex: 1;">
                          <label for="endDate" id="endDateLabel">Do:</label>
                          <input type="date" id="endDate" name="endDate" value="{endDate}" required style="width: 100%; padding: 8px;" />
                      </div>
                  </div>

                  <div id="advancedFilters" style="background-color: #f8f9fc; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e3e6f0;">
                      <h4 style="margin-top: 0; margin-bottom: 15px; color: #4e73df;">Zaawansowane Filtry (Dla Zestawienia)</h4>

                      <div class="form-group" style="margin-bottom: 10px;">
                          <label>Typ operacji:</label>
                          <select name="transactionTypeFilter" style="width: 100%; padding: 8px;">
                              <option value="All">Wszystkie operacje (Bilans)</option>
                              <option value="Costs">Tylko Koszty (Wydatki)</option>
                              <option value="Revenue">Tylko Przychody</option>
                          </select>
                      </div>

                      <div style="display: flex; gap: 1rem; margin-bottom: 10px;">
                          <div class="form-group" style="flex: 1;">
                              <label>Kwota od:</label>
                              <input type="number" name="minAmount" style="width: 100%; padding: 8px;">
                          </div>
                          <div class="form-group" style="flex: 1;">
                              <label>Kwota do:</label>
                              <input type="number" name="maxAmount" style="width: 100%; padding: 8px;">
                          </div>
                      </div>

                      <div class="form-group">
                          <label>Kontrahent (Opcjonalnie):</label>
                          <select name="contractorId" id="contractorSelect" style="width: 100%; padding: 8px;">
                              <option value="">Wszyscy kontrahenci</option>
                          </select>
                      </div>
                  </div>

                  <button type="submit" id="mainSubmitBtn" class="btn-generate" formaction="/reports/generate" style="width: 100%; padding: 12px; background: #4e73df; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
                      <i class="fas fa-file-pdf"></i> Pobierz Raport
                  </button>
              </form>

              <script>
                  const selector = document.getElementById('reportTypeSelector');
                  const advFilters = document.getElementById('advancedFilters');
                  const startDateContainer = document.getElementById('startDateContainer');
                  const endDateLabel = document.getElementById('endDateLabel');
                  const submitBtn = document.getElementById('mainSubmitBtn');

                  selector.addEventListener('change', function () {
                      if (this.value === 'turnover') {
                          advFilters.style.display = 'block'; // Pokaż filtry kwot i typów
                          startDateContainer.style.display = 'block'; // Pokaż datę "Od"
                          endDateLabel.innerText = "Do:";
                          submitBtn.formAction = "/reports/generate"; // Endpoint dla Raportu 1
                          submitBtn.style.background = "#4e73df";
                      } else {
                          advFilters.style.display = 'none'; // Ukryj filtry
                          startDateContainer.style.display = 'none'; // Wiekowanie robi się tylko "na dzień"
                          endDateLabel.innerText = "Dane na dzień:";
                          submitBtn.formAction = "/reports/generate/agingReport"; // Endpoint dla Raportu 2
                          submitBtn.style.background = "#1cc88a";
                      }
                  });
              </script>

          </section>

          <form action="/reports/generate" method="POST">
              <input type="date" name="startDate" required>
              <input type="date" name="endDate" required>

              <select name="transactionTypeFilter">
                  <option value="All">Wszystko</option>
                  <option value="Costs">Tylko Koszty</option>
                  <option value="Revenue">Tylko Przychody</option>
              </select>

              <input type="number" name="minAmount" placeholder="Kwota od...">
              <input type="number" name="maxAmount" placeholder="Kwota do...">

              <select name="contractorId" id="contractorSelect">
                  <option value="">Wszyscy kontrahenci</option>
              </select>

              <button type="submit">Generuj Zestawienie Obrotów</button>
          </form>

          <!-- Placeholder slots for additional UI elements or ads -->
          <div class="ads-row">
              <div class="ad-placeholder"><span>Miejsce na reklamę</span></div>
              <div class="ad-placeholder"><span>Miejsce na reklamę</span></div>
          </div>
      </main>
    </div>

    <!-- Interactive UI Logic -->
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("sidebar-toggle");
        const sidebar = document.querySelector(".sidebar");

        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("open");
          });
        }

        // Close sidebar when clicking outside on mobile devices
        document.addEventListener("click", (e) => {
          if (
            window.innerWidth <= 768 &&
            sidebar.classList.contains("open") &&
            !sidebar.contains(e.target) &&
            !toggleBtn.contains(e.target)
          ) {
            sidebar.classList.remove("open");
          }
        });
      });
    </script>
  </body>
</html>
