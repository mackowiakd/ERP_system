<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dodaj fakturę - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .flex-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .flex-row .form-group {
        margin-bottom: 0;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn-cancel {
        background-color: #dc3545;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Mini-ERP System</span>
      </div>

      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Wystaw nową Fakturę</h2>

          <form id="new-invoice-form">
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Numer Faktury</label>
                <input
                  type="text"
                  id="invNumber"
                  required
                  class="form-input"
                  placeholder="np. FV/2024/01"
                />
              </div>
              <div class="form-group" style="flex: 2">
                <label>Wybierz Kontrahenta</label>
                <select id="invContractor" required class="form-input">
                  <option value="">Wybierz...</option>
                </select>
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Data wystawienia</label>
                <input
                  type="date"
                  id="invIssueDate"
                  required
                  class="form-input"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Termin płatności</label>
                <input
                  type="date"
                  id="invDueDate"
                  required
                  class="form-input"
                />
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Kwota Netto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  id="invNet"
                  required
                  class="form-input"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Kwota Brutto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  id="invGross"
                  required
                  class="form-input"
                />
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Typ Faktury</label>
                <select id="invType" class="form-input">
                  <option value="0">Sprzedażowa</option>
                  <option value="1">Kosztowa</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Metoda płatności</label>
                <select id="invPayment" class="form-input">
                  <option value="0">Gotówka</option>
                  <option value="1">Karta</option>
                  <option value="2">Przelew</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Status opłacenia</label>
                <select id="invStatus" class="form-input">
                  <option value="0">Nieopłacona</option>
                  <option value="2">Częściowo opłacona</option>
                  <option value="1">Opłacona</option>
                </select>
              </div>
            </div>
            <div class="flex-row">
                <div class="form-group" style="flex: 1">
                    <label>Zawartość faktury</label>
                    <input type="text"
                           id="InvNotes"
                           class="form-input"/>
                </div>
            </div>

            <div class="flex-row" style="align-items: center; gap: 10px; margin-bottom: 20px;">
                <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 0;">
                    <input type="checkbox" id="invIsRecurring" style="width: 20px; height: 20px;">
                    <label for="invIsRecurring" style="margin-bottom: 0;">Faktura cykliczna</label>
                </div>
                <div id="recurringOptions" style="display: none; flex: 1; gap: 10px;">
                    <select id="invRecurringType" class="form-input">
                        <option value="daily">Co dzień</option>
                        <option value="monthly" selected>Co miesiąc</option>
                        <option value="quarterly">Co kwartał</option>
                        <option value="yearly">Co rok</option>
                    </select>
                </div>
            </div>
                <button type="submit" class="btn-submit">Zapisz Fakturę</button>
                <a href="/invoices" class="btn-cancel">Anuluj</a>
</form>
        </section>
      </main>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Ustaw dzisiejszą datę domyślnie
            document.getElementById("invIssueDate").valueAsDate = new Date();
            document.getElementById("invDueDate").valueAsDate = new Date();

            // Pobierz kontrahentów do listy rozwijanej
            try {
                const res = await fetch("/api/contractors");
                const data = await res.json();
                const select = document.getElementById("invContractor");
                data.forEach((c) => {
                    select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
                });
            } catch (e) {
                console.log("Błąd ładowania kontrahentów");
            }

            // Obsługa pokazania opcji cyklicznych
            const isRecurringCheckbox = document.getElementById("invIsRecurring");
            const recurringOptions = document.getElementById("recurringOptions");
            isRecurringCheckbox.addEventListener("change", () => {
                recurringOptions.style.display = isRecurringCheckbox.checked ? "block" : "none";
            });

            // Obsługa wysyłania formularza
            document
                .getElementById("new-invoice-form")
                .addEventListener("submit", async (e) => {
                    e.preventDefault();

                    let frequencyUnit = null;
                    let intervalValue = null;
                    const isRecurring = document.getElementById("invIsRecurring").checked;
                    
                    if (isRecurring) {
                        const recurringType = document.getElementById("invRecurringType").value;
                        switch (recurringType) {
                            case "daily":
                                frequencyUnit = 0; // Days
                                intervalValue = 1;
                                break;
                            case "monthly":
                                frequencyUnit = 2; // Months
                                intervalValue = 1;
                                break;
                            case "quarterly":
                                frequencyUnit = 2; // Months
                                intervalValue = 3;
                                break;
                            case "yearly":
                                frequencyUnit = 3; // Years
                                intervalValue = 1;
                                break;
                        }
                    }

                    // Zbieranie danych
                    const payload = {
                        InvoiceNumber: document.getElementById("invNumber").value,
                        ContractorId: parseInt(
                            document.getElementById("invContractor").value,
                        ),
                        IssueDate: document.getElementById("invIssueDate").value,
                        DueDate: document.getElementById("invDueDate").value,
                        TotalNet: parseFloat(document.getElementById("invNet").value),
                        TotalGross: parseFloat(document.getElementById("invGross").value),
                        Type: parseInt(document.getElementById("invType").value),
                        PaymentMethod: parseInt(
                            document.getElementById("invPayment").value,
                        ),
                        Notes: String(document.getElementById("InvNotes").value),
                        Status: parseInt(document.getElementById("invStatus").value),
                        IsRecurring: isRecurring,
                        FrequencyUnit: frequencyUnit,
                        IntervalValue: intervalValue
                    };

                    // Wysyłka do API
                    const res = await fetch("/api/invoices", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload),
                    });

                    const result = await res.json();
                    if (result.success) {
                        window.location.href = "/invoices"; // Po sukcesie przenieś na listę
                    } else {
                        alert("Błąd: " + result.message);
                    }
                });
        });
    </script>
  </body>
</html>
