<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dodaj fakturę - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .flex-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .flex-row .form-group {
        margin-bottom: 0;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn-cancel {
        background-color: #dc3545;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Mini-ERP System</span>
      </div>

      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Wystaw nową Fakturę</h2>

          <form id="new-invoice-form">
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Numer Faktury</label>
                <input
                  type="text"
                  id="invNumber"
                  required
                  class="form-input"
                  placeholder="np. FV/2024/01"
                />
              </div>

              <div class="form-group" style="flex: 2">
                <label>Wybierz Kontrahenta</label>
                <div style="display: flex; gap: 10px">
                  <select
                    id="invContractor"
                    required
                    class="form-input"
                    style="flex: 1"
                  >
                    <option value="">Wybierz...</option>
                  </select>
                  <button
                    type="button"
                    id="btnShowNewContractor"
                    class="btn-submit"
                    style="margin-top: 0; background-color: #17a2b8"
                  >
                    <i class="fas fa-plus"></i> Nowy
                  </button>
                </div>
              </div>
            </div>

            <div
              id="newContractorBlock"
              style="
                display: none;
                background-color: #e9ecef;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 15px;
                border: 2px dashed #17a2b8;
              "
            >
              <h4 style="margin-top: 0; color: #17a2b8">
                <i class="fas fa-bolt"></i> Szybkie dodanie kontrahenta
              </h4>
              <div class="flex-row">
                <div class="form-group" style="flex: 2">
                  <label>Nazwa Firmy</label>
                  <input
                    type="text"
                    id="quickContrName"
                    class="form-input"
                    placeholder="np. Januszex Sp. z o.o."
                  />
                </div>
                <div class="form-group" style="flex: 1">
                  <label>NIP</label>
                  <input
                    type="text"
                    id="quickContrNip"
                    class="form-input"
                    placeholder="np. 1234567890"
                  />
                </div>
              </div>
              <div style="text-align: right; margin-top: 10px">
                <button
                  type="button"
                  id="btnCancelContractor"
                  class="btn-cancel"
                  style="padding: 5px 10px"
                >
                  Anuluj
                </button>
                <button
                  type="button"
                  id="btnSaveContractor"
                  class="btn-submit"
                  style="margin-top: 0; padding: 5px 10px"
                >
                  Zapisz i Wybierz
                </button>
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Data wystawienia</label>
                <input
                  type="date"
                  id="invIssueDate"
                  required
                  class="form-input"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Termin płatności</label>
                <input
                  type="date"
                  id="invDueDate"
                  required
                  class="form-input"
                />
              </div>
            </div>

            <div
              class="flex-row"
              style="
                background-color: #f8f9fa;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 15px;
              "
            >
              <div class="form-group" style="flex: 1">
                <label>Kwota Netto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  id="invNet"
                  required
                  class="form-input"
                  placeholder="0.00"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Stawka VAT</label>
                <select id="vatRate" class="form-input">
                  <option value="23">23% (Podstawowa)</option>
                  <option value="8">8% (Obniżona)</option>
                  <option value="5">5% (Obniżona)</option>
                  <option value="0">0% / ZW</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Kwota Brutto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  id="invGross"
                  required
                  class="form-input"
                  readonly
                  style="
                    background-color: #e9ecef;
                    font-weight: bold;
                    cursor: not-allowed;
                  "
                />
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Typ Faktury</label>
                <select id="invType" class="form-input">
                  <option value="0">Sprzedażowa</option>
                  <option value="1">Kosztowa</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Metoda płatności</label>
                <select id="invPayment" class="form-input">
                  <option value="0">Gotówka</option>
                  <option value="1">Karta</option>
                  <option value="2">Przelew</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Status opłacenia</label>
                <select id="invStatus" class="form-input">
                  <option value="0">Nieopłacona</option>
                  <option value="2">Częściowo opłacona</option>
                  <option value="1">Opłacona</option>
                </select>
              </div>
            </div>
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Zawartość faktury</label>
                <input type="text" id="InvNotes" class="form-input" />
              </div>
            </div>

            <div
              class="flex-row"
              style="align-items: center; gap: 10px; margin-bottom: 20px"
            >
              <div
                class="form-group"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  margin-bottom: 0;
                "
              >
                <input
                  type="checkbox"
                  id="invIsRecurring"
                  style="width: 20px; height: 20px"
                />
                <label for="invIsRecurring" style="margin-bottom: 0"
                  >Faktura cykliczna</label
                >
              </div>
              <div
                id="recurringOptions"
                style="display: none; flex: 1; gap: 10px"
              >
                <select id="invRecurringType" class="form-input">
                  <option value="daily">Co dzień</option>
                  <option value="monthly" selected>Co miesiąc</option>
                  <option value="quarterly">Co kwartał</option>
                  <option value="yearly">Co rok</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-submit">Zapisz Fakturę</button>
            <a href="/invoices" class="btn-cancel">Anuluj</a>
          </form>
        </section>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // Ustaw dzisiejszą datę domyślnie
        document.getElementById("invIssueDate").valueAsDate = new Date();
        document.getElementById("invDueDate").valueAsDate = new Date();

        // Pobierz kontrahentów do listy rozwijanej
        try {
          const res = await fetch("/api/contractors");
          const data = await res.json();
          const select = document.getElementById("invContractor");
          data.forEach((c) => {
            select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
          });
        } catch (e) {
          console.log("Błąd ładowania kontrahentów");
        }

        // Obsługa pokazania opcji cyklicznych
        const isRecurringCheckbox = document.getElementById("invIsRecurring");
        const recurringOptions = document.getElementById("recurringOptions");
        isRecurringCheckbox.addEventListener("change", () => {
          recurringOptions.style.display = isRecurringCheckbox.checked
            ? "block"
            : "none";
        });

        // Obsługa wysyłania formularza
        document
          .getElementById("new-invoice-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();

            let frequencyUnit = null;
            let intervalValue = null;
            const isRecurring =
              document.getElementById("invIsRecurring").checked;

            if (isRecurring) {
              const recurringType =
                document.getElementById("invRecurringType").value;
              switch (recurringType) {
                case "daily":
                  frequencyUnit = 0; // Days
                  intervalValue = 1;
                  break;
                case "monthly":
                  frequencyUnit = 2; // Months
                  intervalValue = 1;
                  break;
                case "quarterly":
                  frequencyUnit = 2; // Months
                  intervalValue = 3;
                  break;
                case "yearly":
                  frequencyUnit = 3; // Years
                  intervalValue = 1;
                  break;
              }
            }

            // Zbieranie danych
            const payload = {
              InvoiceNumber: document.getElementById("invNumber").value,
              ContractorId: parseInt(
                document.getElementById("invContractor").value,
              ),
              IssueDate: document.getElementById("invIssueDate").value,
              DueDate: document.getElementById("invDueDate").value,
              TotalNet: parseFloat(document.getElementById("invNet").value),
              TotalGross: parseFloat(document.getElementById("invGross").value),
              Type: parseInt(document.getElementById("invType").value),
              PaymentMethod: parseInt(
                document.getElementById("invPayment").value,
              ),
              Notes: String(document.getElementById("InvNotes").value),
              Status: parseInt(document.getElementById("invStatus").value),
              IsRecurring: isRecurring,
              FrequencyUnit: frequencyUnit,
              IntervalValue: intervalValue,
            };

            // Wysyłka do API
            const res = await fetch("/api/invoices", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            const result = await res.json();
            if (result.success) {
              window.location.href = "/invoices"; // Po sukcesie przenieś na listę
            } else {
              alert("Błąd: " + result.message);
            }
          });
        // 1. Walidacja Dat "w locie"
        const issueDateEl = document.getElementById("invIssueDate");
        const dueDateEl = document.getElementById("invDueDate");

        issueDateEl.addEventListener("change", () => {
          dueDateEl.min = issueDateEl.value; // Zablokuj wsteczne daty w kalendarzu
          if (dueDateEl.value && dueDateEl.value < issueDateEl.value) {
            dueDateEl.value = issueDateEl.value;
          }
        });

        // 2. Automatyczne przeliczanie Netto + VAT = Brutto
        const netEl = document.getElementById("invNet");
        const vatEl = document.getElementById("vatRate");
        const grossEl = document.getElementById("invGross");

        function calculateGross() {
          let net = parseFloat(netEl.value) || 0;
          let vat = parseFloat(vatEl.value) || 0;
          let gross = net * (1 + vat / 100);
          grossEl.value = gross.toFixed(2);
        }

        netEl.addEventListener("input", calculateGross);
        vatEl.addEventListener("change", calculateGross);

        // 3. Obsługa Szybkiego Dodawania Kontrahenta
        const btnShowNew = document.getElementById("btnShowNewContractor");
        const btnCancel = document.getElementById("btnCancelContractor");
        const btnSave = document.getElementById("btnSaveContractor");
        const newContractorBlock =
          document.getElementById("newContractorBlock");
        const contractorSelect = document.getElementById("invContractor");

        btnShowNew.addEventListener("click", () => {
          newContractorBlock.style.display = "block";
          btnShowNew.style.display = "none";
        });

        btnCancel.addEventListener("click", () => {
          newContractorBlock.style.display = "none";
          btnShowNew.style.display = "block";
          document.getElementById("quickContrName").value = "";
          document.getElementById("quickContrNip").value = "";
        });

        btnSave.addEventListener("click", async () => {
          const name = document.getElementById("quickContrName").value;
          const nip = document.getElementById("quickContrNip").value;

          if (!name || !nip) {
            alert("Wypełnij nazwę i NIP!");
            return;
          }

          // Wysłanie zapytania do API żeby utworzyć nowego kontrahenta
          try {
            const res = await fetch("/api/contractors", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ Name: name, Nip: nip }),
            });
            const result = await res.json();

            if (result.success || result.id) {
              // Tworzymy nową opcję na liście
              const newOption = new Option(
                name,
                result.id || result.contractorId,
                true,
                true,
              );
              contractorSelect.add(newOption);

              // Zamykamy formularz i czyścimy pola
              btnCancel.click();
              alert("Dodano kontrahenta pomyślnie!");
            } else {
              alert("Błąd dodawania: " + result.message);
            }
          } catch (e) {
            console.log("Błąd:", e);
            alert("Wystąpił błąd podczas dodawania kontrahenta.");
          }
        });
      });
    </script>
  </body>
</html>
