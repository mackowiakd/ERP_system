<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dodaj fakturę - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .flex-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .flex-row .form-group {
        margin-bottom: 0;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn-cancel {
        background-color: #dc3545;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Mini-ERP System</span>
      </div>

      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Wystaw nową Fakturę</h2>

          <form id="new-invoice-form">
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Numer Faktury</label>
                <input
                  type="text"
                  id="invNumber"
                  required
                  class="form-input"
                  placeholder="np. FV/2024/01"
                />
              </div>

              <div class="form-group" style="flex: 2">
                <label>Wybierz Kontrahenta</label>
                <div style="display: flex; gap: 10px">
                  <select
                    id="invContractor"
                    required
                    class="form-input"
                    style="flex: 1"
                  >
                    <option value="">Wybierz...</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Kategoria Księgowa</label>
                <div style="display: flex; gap: 10px">
                  <select id="invCategory" class="form-input" style="flex: 1">
                    <option value="">Wybierz...</option>
                  </select>
                </div>
              </div>
            </div>

            <div
              id="newCategoryBlock"
              style="
                display: none;
                background: #f8f9fa;
                padding: 15px;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                margin-bottom: 20px;
              "
            >
              <div class="form-group">
                <label>Nazwa Kategorii</label>
                <input
                  type="text"
                  id="quickCatName"
                  class="form-input"
                  placeholder="np. Zakupy biurowe"
                />
              </div>
              <div class="form-group">
                <label>Opis (opcjonalnie)</label>
                <input
                  type="text"
                  id="quickCatDesc"
                  class="form-input"
                  placeholder="Krótki opis..."
                />
              </div>
              <div style="margin-top: 10px; display: flex; gap: 10px">
                <button
                  type="button"
                  id="btnSaveQuickCategory"
                  class="btn-primary"
                  style="flex: 1"
                >
                  Zapisz
                </button>
                <button
                  type="button"
                  id="btnCancelQuickCategory"
                  class="btn-secondary"
                  style="flex: 1"
                >
                  Anuluj
                </button>
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Data wystawienia</label>
                <input
                  type="date"
                  id="invIssueDate"
                  required
                  class="form-input"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Termin płatności</label>
                <input
                  type="date"
                  id="invDueDate"
                  required
                  class="form-input"
                />
              </div>
            </div>

            <div
              class="flex-row"
              style="
                background-color: #f8f9fa;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 15px;
              "
            >
              <div class="form-group" style="flex: 1">
                <label>Kwota Netto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  id="invNet"
                  required
                  class="form-input"
                  placeholder="0.00"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Stawka VAT</label>
                <select id="vatRate" class="form-input">
                  <option value="23">23% (Podstawowa)</option>
                  <option value="8">8% (Obniżona)</option>
                  <option value="5">5% (Obniżona)</option>
                  <option value="0">0% / ZW</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Kwota Brutto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  id="invGross"
                  required
                  class="form-input"
                  readonly
                  style="
                    background-color: #e9ecef;
                    font-weight: bold;
                    cursor: not-allowed;
                  "
                />
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Typ Faktury</label>
                <select id="invType" class="form-input">
                  <option value="0">Sprzedażowa</option>
                  <option value="1">Kosztowa</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Metoda płatności</label>
                <select id="invPayment" class="form-input">
                  <option value="0">Gotówka</option>
                  <option value="1">Karta</option>
                  <option value="2">Przelew</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Status opłacenia</label>
                <select id="invStatus" class="form-input">
                  <option value="0">Nieopłacona</option>
                  <option value="2">Częściowo opłacona</option>
                  <option value="1">Opłacona</option>
                </select>
              </div>
            </div>
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Zawartość faktury</label>
                <input type="text" id="invNotes" class="form-input" />
              </div>
            </div>

            <div
              class="flex-row"
              style="align-items: center; gap: 10px; margin-bottom: 20px"
            >
              <div
                class="form-group"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  margin-bottom: 0;
                "
              >
                <input
                  type="checkbox"
                  id="invIsRecurring"
                  style="width: 20px; height: 20px"
                />
                <label for="invIsRecurring" style="margin-bottom: 0"
                  >Faktura cykliczna</label
                >
              </div>
              <div
                id="recurringOptions"
                style="display: none; align-items: center; gap: 10px; flex: 1;"
              >
                <span style="white-space: nowrap; margin-left: 15px;">Co:</span>
                <input type="number" id="invIntervalValue" class="form-input" value="1" min="1" style="width: 70px; margin: 0;">
                <select id="invIntervalType" class="form-input" style="margin: 0;">
                  <option value="0">Dni</option>
                  <option value="1">Tygodni</option>
                  <option value="2" selected>Miesięcy</option>
                  <option value="3">Lat</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-submit">Zapisz Fakturę</button>
            <a href="/invoices" class="btn-cancel">Anuluj</a>
          </form>
        </section>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // 1. Ustaw dzisiejszą datę domyślnie
        document.getElementById("invIssueDate").valueAsDate = new Date();
        document.getElementById("invDueDate").valueAsDate = new Date();

        // 2. Kalkulator VAT
        const netInput = document.getElementById("invNet");
        const vatInput = document.getElementById("vatRate");
        const grossInput = document.getElementById("invGross");

        const calculateGross = () => {
          let net = parseFloat(netInput.value) || 0;
          let vat = parseFloat(vatInput.value) || 0;
          grossInput.value = (net * (1 + vat / 100)).toFixed(2);
        };

        if (netInput && vatInput) {
          netInput.addEventListener("input", calculateGross);
          vatInput.addEventListener("input", calculateGross);
        }

        // 3. Blokada Dat
        const issueDate = document.getElementById("invIssueDate");
        const dueDate = document.getElementById("invDueDate");

        if (issueDate && dueDate) {
          issueDate.addEventListener("change", () => {
            dueDate.min = issueDate.value;
            if (dueDate.value < issueDate.value) {
              dueDate.value = issueDate.value;
            }
          });
        }

        // 4. Pobierz kontrahentów do listy
        try {
          const res = await fetch("/api/contractors");
          const data = await res.json();
          const select = document.getElementById("invContractor");
          select.innerHTML = '<option value="">Wybierz kontrahenta...</option>';
          data.forEach((c) => {
            select.innerHTML += `<option value="${c.id}">${c.name} (NIP: ${c.taxId})</option>`;
          });
          // Dodaj opcję przekierowania na końcu
          select.innerHTML +=
            '<option value="REDIRECT_CONTRACTORS" style="font-weight: bold; color: #4562c2;">+ Dodaj/Zarządzaj kontrahentami...</option>';
        } catch (e) {
          console.log("Błąd ładowania kontrahentów", e);
        }

        // Pobierz kategorie
        async function loadCategories() {
          try {
            const res = await fetch("/categories/data");
            const data = await res.json();
            const select = document.getElementById("invCategory");
            select.innerHTML = '<option value="">Wybierz kategorię...</option>';
            data.forEach((cat) => {
              select.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            });
            // Opcja dodania nowej kategorii w locie
            select.innerHTML +=
              '<option value="ADD_NEW_CATEGORY" style="font-weight: bold; color: #4562c2;">+ Dodaj nową kategorię...</option>';
          } catch (e) {
            console.log("Błąd ładowania kategorii", e);
          }
        }
        loadCategories();

        // Obsługa przekierowania z listy kontrahentów
        document
          .getElementById("invContractor")
          .addEventListener("change", (e) => {
            if (e.target.value === "REDIRECT_CONTRACTORS") {
              window.location.href = "/contractors";
            }
          });

        // Obsługa wyboru z listy kategorii
        const newCategoryBlock = document.getElementById("newCategoryBlock");
        document
          .getElementById("invCategory")
          .addEventListener("change", (e) => {
            if (e.target.value === "ADD_NEW_CATEGORY") {
              newCategoryBlock.style.display = "block";
              // Resetujemy wybór, aby użytkownik mógł ponownie wybrać tę samą opcję później jeśli anuluje
              e.target.value = "";
            } else {
              newCategoryBlock.style.display = "none";
            }
          });

        const btnCancelQuickCat = document.getElementById(
          "btnCancelQuickCategory",
        );
        if (btnCancelQuickCat) {
          btnCancelQuickCat.addEventListener("click", (e) => {
            e.preventDefault();
            newCategoryBlock.style.display = "none";
            document.getElementById("quickCatName").value = "";
            document.getElementById("quickCatDesc").value = "";
          });
        }

        // Obsługa checkboxa transakcji cyklicznej
        const invIsRecurring = document.getElementById("invIsRecurring");
        const recurringOptionsBlock = document.getElementById("recurringOptions");
        if (invIsRecurring && recurringOptionsBlock) {
          invIsRecurring.addEventListener("click", function() {
            recurringOptionsBlock.style.display = this.checked ? "flex" : "none";
          });
          // Initial state check
          if (invIsRecurring.checked) {
              recurringOptionsBlock.style.display = "flex";
          } else {
              recurringOptionsBlock.style.display = "none";
          }
        }

        const btnSaveQuickCat = document.getElementById("btnSaveQuickCategory");
        if (btnSaveQuickCat) {
          btnSaveQuickCat.addEventListener("click", async (e) => {
            e.preventDefault();
            const name = document.getElementById("quickCatName").value.trim();
            const desc = document.getElementById("quickCatDesc").value.trim();

            if (!name) {
              alert("Nazwa kategorii jest wymagana.");
              return;
            }

            try {
              const res = await fetch("/categories/add", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ Name: name, Description: desc }),
              });
              const r = await res.json();

              if (r.success) {
                await loadCategories(); // Przeładuj listę
                newCategoryBlock.style.display = "none";
                alert("Kategoria dodana!");
              } else {
                alert("Błąd: " + r.message);
              }
            } catch (err) {
              alert("Błąd komunikacji z serwerem.");
            }
          });
        }

        // 7. Obsługa wysyłania formularza faktury
        document
          .getElementById("new-invoice-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();

            let frequencyUnit = null;
            let intervalValue = null;
            const isRecurringCheckbox =
              document.getElementById("invIsRecurring");
            const isRecurring = isRecurringCheckbox
              ? isRecurringCheckbox.checked
              : false;

            if (isRecurring) {
              frequencyUnit = parseInt(document.getElementById("invIntervalType").value);
              intervalValue = parseInt(document.getElementById("invIntervalValue").value);
            }

            const payload = {
              InvoiceNumber: document.getElementById("invNumber").value,
              ContractorId: parseInt(
                document.getElementById("invContractor").value,
              ),
              CategoryId: document.getElementById("invCategory").value
                ? parseInt(document.getElementById("invCategory").value)
                : null,
              IssueDate: document.getElementById("invIssueDate").value,
              DueDate: document.getElementById("invDueDate").value,
              TotalNet: parseFloat(document.getElementById("invNet").value),
              TotalGross: parseFloat(document.getElementById("invGross").value),
              Type: parseInt(document.getElementById("invType").value),
              PaymentMethod: parseInt(
                document.getElementById("invPayment").value,
              ),
              Notes: document.getElementById("invNotes").value,
              Status: parseInt(document.getElementById("invStatus").value),
              IsRecurring: isRecurring,
              FrequencyUnit: frequencyUnit,
              IntervalValue: intervalValue,
            };

            try {
              const res = await fetch("/api/invoices", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

              const result = await res.json();
              if (result.success) {
                window.location.href = "/invoices";
              } else {
                alert("Błąd przy zapisie faktury: " + result.message);
              }
            } catch (e) {
              console.error("Błąd wysyłki", e);
            }
          });
      });
    </script>
  </body>
</html>
