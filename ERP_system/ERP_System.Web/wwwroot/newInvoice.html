<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Dodaj fakturę - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      .flex-row {
        display: flex;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .flex-row .form-group {
        margin-bottom: 0;
      }
      .btn-submit {
        background-color: #28a745;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-top: 10px;
      }
      .btn-cancel {
        background-color: #dc3545;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Mini-ERP System</span>
      </div>

      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Wystaw nową Fakturę</h2>

          <form id="new-invoice-form">
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Numer Faktury</label>
                <input
                  type="text"
                  id="invNumber"
                  required
                  class="form-input"
                  placeholder="np. FV/2024/01"
                />
              </div>

              <div class="form-group" style="flex: 2">
                <label>Wybierz Kontrahenta</label>
                <div style="display: flex; gap: 10px">
                  <select
                    id="invContractor"
                    required
                    class="form-input"
                    style="flex: 1"
                  >
                    <option value="">Wybierz...</option>
                  </select>
                  <button
                    type="button"
                    id="btnShowNewContractor"
                    class="btn-submit"
                    style="margin-top: 0; background-color: #4562c2"
                  >
                    <i class="fas fa-plus"></i> Nowy
                  </button>
                </div>
              </div>
            </div>

            <div
              id="newContractorBlock"
              style="
                display: none;
                background: #f8f9fa;
                padding: 15px;
                border: 1px solid #dee2e6;
                border-radius: 8px;
                margin-bottom: 20px;
              "
            >
              <div class="flex-row">
                <div class="form-group" style="flex: 2">
                  <label>Nazwa</label>
                  <input
                    type="text"
                    id="quickContrName"
                    class="form-input"
                    placeholder="Nazwa firmy..."
                  />
                </div>
                <div class="form-group" style="flex: 1">
                  <label>NIP</label>
                  <input
                    type="text"
                    id="quickContrNip"
                    class="form-input"
                    placeholder="1234567890"
                    maxlength="10"
                  />
                </div>
              </div>
              <div class="form-group">
                <label>E-mail</label>
                <input
                  type="email"
                  id="quickContrEmail"
                  class="form-input"
                  placeholder="przyklad@firma.pl"
                />
              </div>
              <div class="form-group">
                <label>Ulica</label>
                <input
                  type="text"
                  id="quickContrStreet"
                  class="form-input"
                  placeholder="ul. Polna 5"
                />
              </div>
              <div class="flex-row">
                <div class="form-group" style="flex: 1">
                  <label>Kod</label>
                  <input
                    type="text"
                    id="quickContrZip"
                    class="form-input"
                    placeholder="00-000"
                  />
                </div>
                <div class="form-group" style="flex: 2">
                  <label>Miasto</label>
                  <input
                    type="text"
                    id="quickContrCity"
                    class="form-input"
                    placeholder="Kraków"
                  />
                </div>
              </div>
              <div style="margin-top: 10px; display: flex; gap: 10px">
                <button
                  type="button"
                  id="btnSaveQuickContractor"
                  class="btn-primary"
                  style="flex: 1"
                >
                  Zapisz
                </button>
                <button
                  type="button"
                  id="btnCancelQuickContractor"
                  class="btn-secondary"
                  style="flex: 1"
                >
                  Anuluj
                </button>
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Data wystawienia</label>
                <input
                  type="date"
                  id="invIssueDate"
                  required
                  class="form-input"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Termin płatności</label>
                <input
                  type="date"
                  id="invDueDate"
                  required
                  class="form-input"
                />
              </div>
            </div>

            <div
              class="flex-row"
              style="
                background-color: #f8f9fa;
                padding: 15px;
                border-radius: 8px;
                margin-bottom: 15px;
              "
            >
              <div class="form-group" style="flex: 1">
                <label>Kwota Netto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  min="0"
                  id="invNet"
                  required
                  class="form-input"
                  placeholder="0.00"
                />
              </div>
              <div class="form-group" style="flex: 1">
                <label>Stawka VAT</label>
                <select id="vatRate" class="form-input">
                  <option value="23">23% (Podstawowa)</option>
                  <option value="8">8% (Obniżona)</option>
                  <option value="5">5% (Obniżona)</option>
                  <option value="0">0% / ZW</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Kwota Brutto (PLN)</label>
                <input
                  type="number"
                  step="0.01"
                  id="invGross"
                  required
                  class="form-input"
                  readonly
                  style="
                    background-color: #e9ecef;
                    font-weight: bold;
                    cursor: not-allowed;
                  "
                />
              </div>
            </div>

            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Typ Faktury</label>
                <select id="invType" class="form-input">
                  <option value="0">Sprzedażowa</option>
                  <option value="1">Kosztowa</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Metoda płatności</label>
                <select id="invPayment" class="form-input">
                  <option value="0">Gotówka</option>
                  <option value="1">Karta</option>
                  <option value="2">Przelew</option>
                </select>
              </div>
              <div class="form-group" style="flex: 1">
                <label>Status opłacenia</label>
                <select id="invStatus" class="form-input">
                  <option value="0">Nieopłacona</option>
                  <option value="2">Częściowo opłacona</option>
                  <option value="1">Opłacona</option>
                </select>
              </div>
            </div>
            <div class="flex-row">
              <div class="form-group" style="flex: 1">
                <label>Zawartość faktury</label>
                <input type="text" id="invNotes" class="form-input" />
              </div>
            </div>

            <div
              class="flex-row"
              style="align-items: center; gap: 10px; margin-bottom: 20px"
            >
              <div
                class="form-group"
                style="
                  display: flex;
                  align-items: center;
                  gap: 10px;
                  margin-bottom: 0;
                "
              >
                <input
                  type="checkbox"
                  id="invIsRecurring"
                  style="width: 20px; height: 20px"
                />
                <label for="invIsRecurring" style="margin-bottom: 0"
                  >Faktura cykliczna</label
                >
              </div>
              <div
                id="recurringOptions"
                style="display: none; flex: 1; gap: 10px"
              >
                <select id="invRecurringType" class="form-input">
                  <option value="daily">Co dzień</option>
                  <option value="monthly" selected>Co miesiąc</option>
                  <option value="quarterly">Co kwartał</option>
                  <option value="yearly">Co rok</option>
                </select>
              </div>
            </div>
            <button type="submit" class="btn-submit">Zapisz Fakturę</button>
            <a href="/invoices" class="btn-cancel">Anuluj</a>
          </form>
        </section>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // 1. Ustaw dzisiejszą datę domyślnie
        document.getElementById("invIssueDate").valueAsDate = new Date();
        document.getElementById("invDueDate").valueAsDate = new Date();

        // 2. Kalkulator VAT
        const netInput = document.getElementById("invNet");
        const vatInput = document.getElementById("vatRate");
        const grossInput = document.getElementById("invGross");

        const calculateGross = () => {
          let net = parseFloat(netInput.value) || 0;
          let vat = parseFloat(vatInput.value) || 0;
          grossInput.value = (net * (1 + vat / 100)).toFixed(2);
        };

        if (netInput && vatInput) {
          netInput.addEventListener("input", calculateGross);
          vatInput.addEventListener("input", calculateGross);
        }

        // 3. Blokada Dat
        const issueDate = document.getElementById("invIssueDate");
        const dueDate = document.getElementById("invDueDate");

        if (issueDate && dueDate) {
          issueDate.addEventListener("change", () => {
            dueDate.min = issueDate.value;
            if (dueDate.value < issueDate.value) {
              dueDate.value = issueDate.value;
            }
          });
        }

        // 4. Pobierz kontrahentów do listy
        try {
          const res = await fetch("/api/contractors");
          const data = await res.json();
          const select = document.getElementById("invContractor");
          select.innerHTML = '<option value="">Wybierz kontrahenta...</option>';
          data.forEach((c) => {
            select.innerHTML += `<option value="${c.id}">${c.name} (NIP: ${c.taxId})</option>`;
          });
        } catch (e) {
          console.log("Błąd ładowania kontrahentów", e);
        }

        // 5. Obsługa pokazania opcji cyklicznych
        const isRecurringCheckbox = document.getElementById("invIsRecurring");
        const recurringOptions = document.getElementById("recurringOptions");
        if (isRecurringCheckbox && recurringOptions) {
          isRecurringCheckbox.addEventListener("change", () => {
            recurringOptions.style.display = isRecurringCheckbox.checked
              ? "block"
              : "none";
          });
        }

        // 6. Obsługa Szybkiego Dodawania Kontrahenta (Wersja PANCERNA)
        const newContractorBlock =
          document.getElementById("newContractorBlock");
        const btnShowNew = document.getElementById("btnShowNewContractor");

        if (btnShowNew) {
          btnShowNew.addEventListener("click", (e) => {
            e.preventDefault(); // Zatrzymuje ewentualne przeładowanie strony
            newContractorBlock.style.display = "block";
            btnShowNew.style.display = "none";
          });
        }

        // Łapiemy przycisk anuluj, niezależnie od tego jak się nazywa w Twoim HTML
        const btnCancelQuick =
          document.getElementById("btnCancelQuickContractor") ||
          document.getElementById("btnCancelContractor");
        if (btnCancelQuick) {
          btnCancelQuick.addEventListener("click", (e) => {
            e.preventDefault();
            newContractorBlock.style.display = "none";
            if (btnShowNew) btnShowNew.style.display = "block";

            // Bezpieczne czyszczenie pól
            const clearField = (id) => {
              if (document.getElementById(id))
                document.getElementById(id).value = "";
            };
            clearField("quickContrName");
            clearField("quickContrNip");
            clearField("quickContrEmail");
            clearField("quickContrStreet");
            clearField("quickContrZip");
            clearField("quickContrCity");
          });
        }

        // Łapiemy przycisk zapisz (obsługuje stare i nowe nazwy ID)
        const btnSaveQuick =
          document.getElementById("btnSaveQuickContractor") ||
          document.getElementById("btnSaveContractor");
        if (btnSaveQuick) {
          btnSaveQuick.addEventListener("click", async (e) => {
            e.preventDefault(); // KRYTYCZNE: Zatrzymuje formularz przed "odświeżeniem" strony

            // Funkcja pomocnicza: pobiera wartość z pola lub pusty string, jeśli pole nie istnieje
            const getVal = (id) =>
              document.getElementById(id)?.value.trim() || "";

            const nip = getVal("quickContrNip");
            const email = getVal("quickContrEmail");
            const zip = getVal("quickContrZip");
            const name = getVal("quickContrName");
            const street = getVal("quickContrStreet");
            const city = getVal("quickContrCity");

            // Walidacja
            if (name === "" || nip === "") {
              alert(
                "NOWY BŁĄD: Program nie widzi wpisanej nazwy lub NIPu. Sprawdź konsolę (F12).",
              );
              return;
            }

            if (!/^\d{10}$/.test(nip)) {
              alert("Błąd: NIP kontrahenta musi mieć 10 cyfr.");
              return;
            }

            if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
              alert("Błąd: Niepoprawny format e-mail.");
              return;
            }

            if (zip && !/^\d{2}-\d{3}$/.test(zip)) {
              alert("Błąd: Kod pocztowy musi mieć format 00-000.");
              return;
            }

            const payload = {
              Name: name,
              TaxId: nip,
              Email: email,
              Street: street,
              ZipCode: zip,
              City: city,
            };

            try {
              const res = await fetch("/api/contractors", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });
              const r = await res.json();

              if (r.success || r.id) {
                const contractorSelect =
                  document.getElementById("invContractor");
                if (contractorSelect) {
                  const option = new Option(
                    `${payload.Name} (NIP: ${payload.TaxId})`,
                    r.id || r.contractorId,
                    true,
                    true,
                  );
                  contractorSelect.add(option);
                }

                if (newContractorBlock)
                  newContractorBlock.style.display = "none";
                if (btnShowNew) btnShowNew.style.display = "block";
                alert("Kontrahent dodany pomyślnie!");
              } else {
                alert("Błąd serwera: " + r.message);
              }
            } catch (err) {
              console.error("Szczegóły błędu:", err);
              alert("Wystąpił błąd krytyczny przy komunikacji z serwerem.");
            }
          });
        }

        // 7. Obsługa wysyłania formularza faktury
        document
          .getElementById("new-invoice-form")
          .addEventListener("submit", async (e) => {
            e.preventDefault();

            let frequencyUnit = null;
            let intervalValue = null;
            const isRecurringCheckbox =
              document.getElementById("invIsRecurring");
            const isRecurring = isRecurringCheckbox
              ? isRecurringCheckbox.checked
              : false;

            if (isRecurring) {
              const recurringType =
                document.getElementById("invRecurringType").value;
              switch (recurringType) {
                case "daily":
                  frequencyUnit = 0;
                  intervalValue = 1;
                  break;
                case "monthly":
                  frequencyUnit = 2;
                  intervalValue = 1;
                  break;
                case "quarterly":
                  frequencyUnit = 2;
                  intervalValue = 3;
                  break;
                case "yearly":
                  frequencyUnit = 3;
                  intervalValue = 1;
                  break;
              }
            }

            const payload = {
              InvoiceNumber: document.getElementById("invNumber").value,
              ContractorId: parseInt(
                document.getElementById("invContractor").value,
              ),
              IssueDate: document.getElementById("invIssueDate").value,
              DueDate: document.getElementById("invDueDate").value,
              TotalNet: parseFloat(document.getElementById("invNet").value),
              TotalGross: parseFloat(document.getElementById("invGross").value),
              Type: parseInt(document.getElementById("invType").value),
              PaymentMethod: parseInt(
                document.getElementById("invPayment").value,
              ),
              Notes: document.getElementById("invNotes").value,
              Status: parseInt(document.getElementById("invStatus").value),
              IsRecurring: isRecurring,
              FrequencyUnit: frequencyUnit,
              IntervalValue: intervalValue,
            };

            try {
              const res = await fetch("/api/invoices", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload),
              });

              const result = await res.json();
              if (result.success) {
                window.location.href = "/invoices";
              } else {
                alert("Błąd przy zapisie faktury: " + result.message);
              }
            } catch (e) {
              console.error("Błąd wysyłki", e);
            }
          });
      });
    </script>
  </body>
</html>
