<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Dołącz do domostwa</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/joinHousehold.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        // Automatyczne wypełnienie pola kodu z adresu URL (?code=XYZ)
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            if (code) {
                document.getElementById('join-code').value = code;
            }
        };
    </script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <p class="sidebar-title"><i class="fas fa-wallet"></i> Mini-ERP System</p>
            <span class="user-name" style="display: block;">Zalogowano jako: {username}</span>
            <br>Menu główne<br>
            <button class="sidebar-link" onclick="window.location.href='/dashboard'"><i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit</button>
            <button class="sidebar-link" onclick="window.location.href='/new-transaction?returnUrl=' + encodeURIComponent(window.location.pathname)"><i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury</button>
            <button class="sidebar-link" onclick="window.location.href='/calendar'"><i class="fas fa-handshake"></i> &nbsp; Kontrahenci</button>
            <button class="sidebar-link" onclick="window.location.href='/charts'"><i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty</button>
            <br>Narzędzia<br>
            <button class="sidebar-link" onclick="window.location.href='/calendar'"><i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz</button>
            <button class="sidebar-link" onclick="window.location.href='/reports'"><i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF</button>
            <button class="sidebar-link" onclick="window.location.href='/household'"><i class="fas fa-users"></i> &nbsp; Pracownicy</button>
            {admin_panel_button}
            <form method="post" action="/logout" style="margin-top: auto; width: 100%;">
                <button type="submit" class="btn-logout">Wyloguj</button>
            </form>
        </aside>

        <main class="container">
            <section class="card">
                <h2>Dołącz do firmy</h2>
                <p class="card-desc">Wprowadź kod zaproszenia, aby dołączyć do istniejącej firmy.</p>

                <form hx-post="/join-household" hx-target="#result" class="join-household-form">
                    <div class="form-group">
                        <label for="join-code">Kod firmy</label>
                        <input id="join-code" type="text" name="code" placeholder="np. A1B2C3" required class="form-input" />
                    </div>
                    <button type="submit" class="btn-primary"><i class="fas fa-sign-in-alt"></i> Dołącz do firmy</button>
                </form>

                <div id="result"></div>

                <div style="text-align: center;">
                    <a href="/household" class="btn-secondary"><i class="fas fa-arrow-left"></i> Powrót</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
