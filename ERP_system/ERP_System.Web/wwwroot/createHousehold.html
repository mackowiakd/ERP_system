<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Stwórz domostwo</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/createHousehold.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="
            window.location.href =
              '/new-transaction?returnUrl=' +
              encodeURIComponent(window.location.pathname)
          "
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/household'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Utwórz swoją firmę</h2>
          <p class="card-desc">
            Rozpocznij wspólne zarządzanie finansami tworząc nową firmę.
          </p>

          <form
            hx-post="/create-household"
            hx-target="#result"
            class="create-household-form"
          >
            <div class="form-group">
              <label for="name">Nazwa firmy</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="np. Rodzina Kowalskich"
                required
                class="form-input"
              />
            </div>

            <div class="form-group">
              <label for="description">Opis (opcjonalnie)</label>
              <input
                type="text"
                id="description"
                name="description"
                placeholder="Krótki opis domostwa"
                class="form-input"
              />
            </div>

            <button type="submit" class="btn-primary">
              <i class="fas fa-plus-circle"></i> Utwórz Firmę
            </button>
          </form>

          <div id="result"></div>

          <div style="text-align: center">
            <a href="/household" class="btn-secondary"
              ><i class="fas fa-arrow-left"></i> Powrót</a
            >
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
