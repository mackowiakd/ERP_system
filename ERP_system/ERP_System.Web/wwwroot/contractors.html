<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Kontrahenci - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/raports.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      /* Proste style dla tabelki, żeby od razu jakoś wyglądała */
      .contractors-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }
      .contractors-table th,
      .contractors-table td {
        padding: 0.75rem;
        border-bottom: 1px solid #ddd;
        text-align: left;
      }
      .contractors-table th {
        background-color: #f8f9fa;
        font-weight: bold;
      }
      .btn-delete {
        background: #dc3545;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-delete:hover {
        background: #c82333;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">Home Budget Manager</span>
      </div>
      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block"
          >Zalogowano jako: {username}</span
        >
        <br />Menu główne<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/dashboard'"
        >
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/invoices'"
        >
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/contractors'"
        >
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button
          class="sidebar-link"
          onclick="window.location.href = '/calendar'"
        >
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/reports'"
        >
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button
          class="sidebar-link"
          onclick="window.location.href = '/company'"
        >
          <i class="fas fa-users"></i> &nbsp; Pracownicy
        </button>
        {admin_panel_button}
        <form
          method="post"
          action="/logout"
          style="margin-top: auto; width: 100%"
        >
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <main class="container">
        <section class="card">
          <h2>Dodaj Kontrahenta</h2>
          <p class="card-desc">
            Wpisz dane nowej firmy, z którą współpracujecie.
          </p>

          <form id="add-contractor-form" class="report-controls">
            <div class="form-group">
              <label>Nazwa Firmy</label>
              <input
                type="text"
                id="name"
                class="form-input"
                required
                placeholder="Wpisz nazwę firmy..."
              />
            </div>
            <div class="form-group">
              <label>NIP</label>
              <input
                type="text"
                id="taxId"
                class="form-input"
                pattern="\d{10}"
                maxlength="10"
                title="NIP musi składać się z 10 cyfr"
                required
                placeholder="1234567890"
                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                required
              />
            </div>
            <div class="form-group">
              <label>E-mail</label>
              <input
                type="email"
                id="email"
                class="form-input"
                required
                placeholder="przyklad@firma.pl"
                pattern="[^@\s]+@[^@\s]+\.[^@\s]+"
                title="Wpisz poprawny adres e-mail (np. nazwa@domena.pl)"
              />
            </div>
            <div class="form-group">
              <label>Ulica i numer</label>
              <input
                type="text"
                id="street"
                class="form-input"
                placeholder="ul. Prosta 10/2"
              />
            </div>
            <div class="form-group">
              <label>Kod pocztowy</label>
              <input
                type="text"
                id="zipCode"
                class="form-input"
                inputmode="numeric"
                pattern="\d{2}-\d{3}"
                placeholder="00-000"
                title="Kod pocztowy musi być w formacie 00-000"
                maxlength="6"
              />
            </div>
            <div class="form-group">
              <label>Miasto</label>
              <input
                type="text"
                id="city"
                class="form-input"
                placeholder="Warszawa"
              />
            </div>
            <div class="form-group">
              <button type="submit" class="btn-generate">Dodaj do bazy</button>
            </div>
          </form>
        </section>

        <section class="card" style="margin-top: 2rem">
          <h2>Lista Kontrahentów</h2>
          <table class="contractors-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Nazwa firmy</th>
                <th>NIP</th>
                <th>Adres</th>
                <th style="text-align: right">Akcje</th>
              </tr>
            </thead>
            <tbody id="contractors-list">
              <tr>
                <td colspan="5" style="text-align: center">
                  Ładowanie danych...
                </td>
              </tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
    <script src="js/contractors.js"></script>
  </body>
</html>
