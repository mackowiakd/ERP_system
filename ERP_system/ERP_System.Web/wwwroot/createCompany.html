<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Utwórz Firmę - ERP_System</title>
    <link rel="stylesheet" href="/css/dashboard.css" />
    <link rel="stylesheet" href="/css/raports.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  </head>
  <body>
    <div class="layout">
      <!-- Mobile Header -->
      <div class="mobile-header">
        <button id="sidebar-toggle" aria-label="Menu">
          <i class="fas fa-bars"></i>
        </button>
        <span class="mobile-logo">System Mini-ERP</span>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar">
        <p class="sidebar-title">
          <i class="fas fa-wallet"></i> Mini-ERP System
        </p>
        <span class="user-name" style="display: block">Zalogowano jako: {username}</span>
        <br />Menu główne<br />
        <button class="sidebar-link" onclick="window.location.href = '/dashboard'">
          <i class="fas fa-fw fa-tachometer-alt"></i> &nbsp; Pulpit
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/invoices'">
          <i class="fas fa-file-invoice-dollar"></i> &nbsp; Faktury
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/contractors'">
          <i class="fas fa-handshake"></i> &nbsp; Kontrahenci
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/charts'">
          <i class="fas fa-exchange-alt"></i> &nbsp; Finanse i Wypłaty
        </button>
        <br />Narzędzia<br />
        <button class="sidebar-link" onclick="window.location.href = '/calendar'">
          <i class="fas fa-fw fa-calendar-alt"></i> &nbsp; Kalendarz
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/reports'">
          <i class="fas fa-chart-pie"></i> &nbsp; Raporty PDF
        </button>
        <button class="sidebar-link" onclick="window.location.href = '/company'">
          <i class="fas fa-users"></i> &nbsp; Moja Firma
        </button>
        {admin_panel_button}
        <form method="post" action="/logout" style="margin-top: auto; width: 100%">
          <button type="submit" class="btn-logout">Wyloguj</button>
        </form>
      </aside>

      <!-- Main Content -->
      <main class="container">
        <section class="card" style="max-width: 600px; margin: 2rem auto;">
          <h2>Utwórz nową firmę</h2>
          <p class="card-desc">
            Wypełnij poniższy formularz, aby zarejestrować swoją firmę w systemie.
          </p>

          <form hx-post="/create-company" hx-target="#result" class="report-controls" style="margin-top: 20px;">
            <div class="form-group">
              <label for="name">Nazwa krótka:</label>
              <input type="text" id="name" name="name" required class="form-input" placeholder="np. Moja Firma">
            </div>
            <div class="form-group">
              <label for="fullName">Nazwa pełna:</label>
              <input type="text" id="fullName" name="fullName" required class="form-input" placeholder="np. Moja Firma Spółka z o.o.">
            </div>
            <div class="form-group">
              <label for="nip">NIP:</label>
              <input type="text" id="nip" name="nip" required class="form-input" placeholder="np. 1234567890">
            </div>
            <div class="form-group">
              <label for="address">Adres:</label>
              <input type="text" id="address" name="address" required class="form-input" placeholder="ul. Sezamkowa 1, 00-001 Miasto">
            </div>
            <div class="form-group">
              <label for="description">Opis firmy (opcjonalny):</label>
              <textarea id="description" name="description" class="form-input" style="height: 80px;" placeholder="Krótki opis działalności..."></textarea>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-plus-circle"></i> Utwórz firmę
                </button>
                <button type="button" class="btn-secondary" onclick="window.location.href='/company'">
                    Anuluj
                </button>
            </div>
          </form>

          <div id="result" style="margin-top: 20px;"></div>
        </section>

        <!-- Ad Placeholders -->
        <div class="ads-row" style="margin-top: 2rem; display: flex; gap: 1rem;">
          <div class="ad-placeholder" style="flex: 1; height: 150px; background: #eaecf4; display: flex; align-items: center; justify-content: center; border-radius: 8px;"><span>Miejsce na reklamę</span></div>
          <div class="ad-placeholder" style="flex: 1; height: 150px; background: #eaecf4; display: flex; align-items: center; justify-content: center; border-radius: 8px;"><span>Miejsce na reklamę</span></div>
        </div>
      </main>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const toggleBtn = document.getElementById("sidebar-toggle");
        const sidebar = document.querySelector(".sidebar");

        if (toggleBtn) {
          toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("open");
          });
        }
      });
    </script>
  </body>
</html>
